name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"         # 推送语义化版本 tag 时自动触发，如 v1.2.0
  workflow_dispatch:     # 支持在 Actions 页面手动触发
    inputs:
      version:
        description: "手动指定版本号（如 v1.0.0-beta），留空则使用 git tag"
        required: false
        default: ""

jobs:
  build-windows:
    name: Windows 打包 (PyInstaller)
    runs-on: windows-latest

    steps:
      # ── 检出代码 ──────────────────────────────────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4

      # ── Python 环境 ───────────────────────────────────────────────────────
      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 安装依赖 ──────────────────────────────────────────────────────────
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install paramiko PySide6 pyinstaller

      # ── 准备脱敏配置文件（打包时不含真实密码）──────────────────────────
      - name: 准备 config.json（使用示例模板）
        shell: pwsh
        run: |
          Copy-Item config.example.json config.json
          Write-Host "✅ 使用 config.example.json 作为打包配置模板"

      # ── PyInstaller 打包 ──────────────────────────────────────────────────
      - name: PyInstaller 打包
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name CodePullTool `
            --add-data "config.example.json;." `
            main.py
        shell: pwsh

      # ── 验证产物 ─────────────────────────────────────────────────────────
      - name: 验证 EXE 产物
        shell: pwsh
        run: |
          if (Test-Path "dist/CodePullTool.exe") {
            $size = (Get-Item "dist/CodePullTool.exe").Length / 1MB
            Write-Host "✅ 打包成功：dist/CodePullTool.exe ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Host "❌ 打包失败，未找到 dist/CodePullTool.exe"
            exit 1
          }

      # ── 复制 config 模板到 dist ──────────────────────────────────────────
      - name: 整理发布产物
        shell: pwsh
        run: |
          Copy-Item config.example.json dist\config.json
          Write-Host "发布目录内容："
          Get-ChildItem dist\

      # ── 确定版本号 ────────────────────────────────────────────────────────
      - name: 确定版本号
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $ver = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $ver = "${{ github.ref_name }}"
          } else {
            $ver = "dev-$(git rev-parse --short HEAD)"
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "版本号: $ver"

      # ── 上传 Artifacts（供调试下载，保留 30 天）────────────────────────
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: CodePullTool-${{ steps.version.outputs.VERSION }}-windows
          path: |
            dist/CodePullTool.exe
            dist/config.json
          retention-days: 30

      # ── 创建 GitHub Release（仅 tag 触发时执行）─────────────────────────
      - name: 创建 GitHub Release
        if: github.ref_type == 'tag' || github.event.inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "CodePull Tool ${{ steps.version.outputs.VERSION }}"
          body: |
            ## CodePull Tool ${{ steps.version.outputs.VERSION }}

            ### 下载说明
            - **`CodePullTool.exe`** — Windows 单文件可执行程序，无需安装 Python
            - **`config.json`** — 配置文件模板，下载后**必须修改**为你的真实服务器信息

            ### 快速使用
            1. 下载 `CodePullTool.exe` 和 `config.json` 到同一目录
            2. 编辑 `config.json`，填入 SSH 服务器地址、用户名和密码
            3. 双击运行 `CodePullTool.exe`

            ### 配置文件格式
            ```json
            {
              "ssh": {
                "host": "你的服务器IP",
                "port": 22,
                "username": "用户名",
                "password": "密码"
              },
              "projects": {
                "项目名": {
                  "path": "/服务器上的路径",
                  "branch": "分支名"
                }
              }
            }
            ```

            ---
            > ⚠️ **注意**：请勿将真实密码提交到 Git 仓库。
          files: |
            dist/CodePullTool.exe
            dist/config.json
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
