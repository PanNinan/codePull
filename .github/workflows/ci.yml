name: CI

on:
  push:
    branches: [ "main", "master", "dev*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-validate:
    name: 代码检查与配置验证
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ── Python 环境 ─────────────────────────────────────────────────────────
      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 安装 lint 工具（不安装 PySide6/pyinstaller，加快 CI 速度）──────────
      - name: 安装检查工具
        run: |
          pip install --upgrade pip
          pip install flake8 pylint

      # ── 语法检查 ─────────────────────────────────────────────────────────────
      - name: 语法检查 (py_compile)
        run: python -m py_compile main.py && echo "✅ 语法检查通过"

      # ── Flake8 风格检查 ───────────────────────────────────────────────────────
      - name: Flake8 风格检查
        run: |
          flake8 main.py \
            --max-line-length=120 \
            --extend-ignore=E501 \
            --statistics
        continue-on-error: false

      # ── Pylint 静态分析（评分低于 6.0 仅警告，不阻断 CI）──────────────────
      - name: Pylint 静态分析
        run: |
          pylint main.py \
            --disable=C0114,C0115,C0116,R0903,W0611 \
            --max-line-length=120 \
            --fail-under=6.0 || true
        continue-on-error: true

      # ── config.example.json 结构验证 ──────────────────────────────────────
      - name: 验证 config.example.json 结构
        run: |
          python - <<'EOF'
          import json, sys

          with open("config.example.json", encoding="utf-8") as f:
              cfg = json.load(f)

          errors = []

          # 检查 SSH 字段
          ssh = cfg.get("ssh", {})
          for key in ["host", "port", "username", "password"]:
              if key not in ssh:
                  errors.append(f"config.example.json 缺少 ssh.{key}")

          # 检查 projects 字段
          projects = cfg.get("projects", {})
          if not projects:
              errors.append("config.example.json 中 projects 不能为空")
          for name, proj in projects.items():
              for key in ["path", "branch"]:
                  if key not in proj:
                      errors.append(f"projects.{name} 缺少字段: {key}")

          if errors:
              print("❌ 配置结构验证失败:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          else:
              print("✅ config.example.json 结构验证通过")
          EOF

      # ── 确认 config.json 未入库 ───────────────────────────────────────────
      - name: 确认 config.json 未入库（安全检查）
        run: |
          if git ls-files --error-unmatch config.json 2>/dev/null; then
            echo "❌ 危险：config.json 被提交到了仓库，含有明文密码，请立即移除！"
            exit 1
          else
            echo "✅ config.json 未入库，安全检查通过"
          fi
